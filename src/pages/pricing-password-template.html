                right: 14px;
                top: 50%;

                font-size: 15px;
                font-weight: 500;
                color: #ffffff;
                background: #111827;
                border: 0;
                border-radius: 10px;
                padding: 13px 16px;
                cursor: pointer;
                transition: background-color 0.15s ease, transform 0.05s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: #1F2937;
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: translateY(1px);
            }

            .staticrypt-form .staticrypt-decrypt-button:focus-visible {
                outline: none;
                box-shadow: 0 0 0 3px rgba(17,24,39,0.18);
            }

            .staticrypt-footer {
                text-align: center;
                margin-top: 18px;
                font-size: 12px;
                color: #9CA3AF;

            .staticrypt-footer a {

                text-decoration: none;
